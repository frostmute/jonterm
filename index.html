<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep:   #050709;
    --bg:        #0a0d11;
    --bg-soft:   #0e1217;
    --bg-elev:   #131820;
    --fg:        #d8d4ce;
    --fg-dim:    #6b7585;
    --fg-faint:  #2a303c;
    --amber:     #ffb86c;
    --amber-bright: #ffd09b;
    --phosphor:  #a3e635;
    --cyan:      #67e8f9;
    --magenta:   #f472b6;
    --red:       #ef4444;
    --green:     #4ade80;
    --yellow:    #facc15;
    --border:    #1d2530;
  }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 14px;
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    background:
      radial-gradient(ellipse 80% 50% at top, rgba(255, 184, 108, 0.05), transparent 70%),
      radial-gradient(ellipse 60% 40% at bottom, rgba(103, 232, 249, 0.025), transparent 70%),
      var(--bg-deep);
  }

  /* film grain noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.5'/></svg>");
    mix-blend-mode: overlay;
    opacity: 0.06;
  }

  /* === CRT OVERLAY === */
  .crt-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.4s;
  }
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.55) 3px,
      rgba(0,0,0,0.55) 4px
    );
    opacity: 0.85;
    animation: scan 6s linear infinite;
  }
  @keyframes scan {
    0% { transform: translateY(0); }
    100% { transform: translateY(4px); }
  }
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 110% 100% at center, transparent 45%, rgba(0,0,0,0.7) 100%);
  }
  .flicker {
    position: absolute;
    inset: 0;
    background: rgba(255, 184, 108, 0.025);
    animation: flicker 7s infinite;
  }
  @keyframes flicker {
    0%, 94%, 100% { opacity: 1; }
    95% { opacity: 0.75; }
    96% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 1; }
  }

  /* === STATUS BAR === */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 14px;
    background: linear-gradient(to bottom, var(--bg-soft), var(--bg));
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--fg-dim);
    flex-shrink: 0;
    user-select: none;
    letter-spacing: 0.02em;
  }
  .status-group { display: flex; gap: 16px; align-items: center; }
  .status-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .status-item b { color: var(--amber); font-weight: 500; }
  .status-item .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 7px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* === TERMINAL === */
  .terminal {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 14px 18px;
    position: relative;
    overflow: hidden;
  }
  .output {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 8px;
    padding-bottom: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .output::-webkit-scrollbar { width: 6px; }
  .output::-webkit-scrollbar-track { background: transparent; }
  .output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .output::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }
  .line {
    margin-bottom: 2px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* === PROMPT === */
  .prompt-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--bg-soft);
    position: relative;
    flex-shrink: 0;
  }
  .prompt {
    color: var(--green);
    text-shadow: 0 0 8px rgba(74, 222, 128, 0.45);
    font-weight: 500;
    flex-shrink: 0;
    user-select: none;
  }
  .prompt .path {
    color: var(--cyan);
    text-shadow: 0 0 6px rgba(103, 232, 249, 0.4);
  }
  .prompt.compose { color: var(--magenta); text-shadow: 0 0 8px rgba(244, 114, 182, 0.5); }
  .input-area { position: relative; flex: 1; min-width: 0; }
  .input-display { pointer-events: none; color: var(--fg); }
  .ghost-text { color: var(--fg-dim); opacity: 0.55; }
  .block-cursor {
    display: inline-block;
    width: 8px;
    height: 17px;
    background: var(--amber);
    vertical-align: text-bottom;
    box-shadow: 0 0 8px var(--amber);
    animation: blink 1.06s steps(2, end) infinite;
    margin-left: 1px;
    margin-right: 1px;
  }
  @keyframes blink {
    0%, 49.999% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  #cmdInput {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: transparent;
    caret-color: transparent;
    font: inherit;
    z-index: 2;
    cursor: text;
    padding: 0;
  }

  .error { color: var(--red); text-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
  .success { color: var(--green); }

  .post strong { color: var(--amber-bright); font-weight: 600; }
  .post code {

    gap: 4px 22px;

      animation-iteration-count: 1 !important;

  }

I build Import Integrations connecting walled-gardens to Obsidian. Make It Rain is my Raindrop.io sync plugin. 

Instead of waiting for APIs to give me what I want, I wrote a sync engine that parses JSON blocks from REST APIs, maps them via a Templater YAML mapping layer, and dumps them natively into my Nexus Vault.

## The Problem
Digital hoarding. If I see a link, I save it. If I see an image, I save it. Raindrop.io, Are.na, Anytype... they all become silos where data goes to die. The "Graveyard Pattern" works for files (\`~/Documents/Graveyard/YYYY-MM-<context>-cleanup/\`), but not for live metadata.

## The Solution
A unified ingest pipeline. Make It Rain pulls Raindrop data. Tetromino pulls Are.na channels. Anytype-sync extracts the local Anytype AST. 

They all route into Obsidian. Obsidian is the central hoard.

## Architecture
- Fetch raw JSON
- Pipe through an AST transformer
- Apply Templater bindings
- Write to \`.md\`

It's robust, it's local-first, and it means I never lose a bookmark to a dead SaaS startup again.

*— EOF —*`

    content: `# How to publish with the Obsidian ‘Digital Garden’ plugin to GitHub Pages

The transition from a private markdown hoard to a public digital garden is a delicate one. I don't want to spin up a heavy CMS, and I don't want to copy-paste markdown files between folders.

The Obsidian 'Digital Garden' plugin bridges the gap, taking individual notes flagged with a specific frontmatter property and deploying them out to a Next.js frontend hosted on Vercel or GitHub Pages.

## Workflow

1. I tag a note in my Nexus Vault with \`dg-publish: true\`.
2. I trigger the Digital Garden publication command.
3. The plugin commits the specific markdown files to a private GitHub repository.
4. GitHub Actions (or Vercel) picks up the commit, builds the static site, and deploys it.

It's entirely frictionless. The note never leaves its original location in my graph, but its rendered output is available globally.

*— EOF —*`

Reviving old hardware with Chrome OS is a classic hacker rite of passage, but native Play Store support is usually the missing link when you aren't using an official Chromebook.

The secret is the 'Brunch' framework.

## The Process

1. Download a compatible Chrome OS recovery image (usually for a device with similar architecture, like \`rammus\` or \`volteer\`).
2. Build the Brunch framework onto a bootable USB drive.
3. Patch the recovery image into the Brunch build.
4. Boot from USB and install to the internal disk.

Because Brunch bridges the hardware abstractions, the Play Store initializes perfectly, allowing you to run Android apps natively on a repurposed Windows laptop.

  green: { phosphor: '#a3e635', bright: '#d4f881' },
  cyan:  { phosphor: '#67e8f9', bright: '#a5f3fc' },
};
function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  document.documentElement.style.setProperty('--amber', t.phosphor);
  document.documentElement.style.setProperty('--amber-bright', t.bright);
  state.theme = name;
  document.getElementById('statusTheme').textContent = name;
}

// =================== AUDIO ===================
let audioCtx;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playClick() {
  if (!state.sound) return;
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1700 + Math.random() * 500, now);
  gain.gain.setValueAtTime(0.018, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.025);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.03);
}
function playBell() {
  if (!state.sound) return;
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, now);
  osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
  gain.gain.setValueAtTime(0.04, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.4);
}

// =================== UTIL ===================
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollBottom() { output.scrollTop = output.scrollHeight; }
function print(html, cls = '') {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.innerHTML = html;
  output.appendChild(div);
  scrollBottom();
  return div;
}
function printRaw(html) { return print(html); }
function printBlank() { print('&nbsp;'); }

// =================== MARKDOWN ===================
function inlineMd(text) {
  return text
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
}
function renderMarkdown(md) {
  const lines = escapeHtml(md).split('\n');
  const out = [];
  let inUl = false, inOl = false, inCode = false;
  let paraBuf = [];
  const flushPara = () => { if (paraBuf.length) { out.push('<p>' + paraBuf.join(' ') + '</p>'); paraBuf = []; } };
  const closeLists = () => { if (inUl) { out.push('</ul>'); inUl = false; } if (inOl) { out.push('</ol>'); inOl = false; } };

  for (const line of lines) {
    if (line.match(/^```/)) {
      if (inCode) { out.push('</code></pre>'); inCode = false; }
      else { flushPara(); closeLists(); out.push('<pre><code>'); inCode = true; }
      continue;
    }
    if (inCode) { out.push(line); continue; }
    if (line.trim() === '') { flushPara(); closeLists(); continue; }
    let m;
    if (m = line.match(/^### (.+)$/)) { flushPara(); closeLists(); out.push('<h3>' + inlineMd(m[1]) + '</h3>'); }
    else if (m = line.match(/^## (.+)$/)) { flushPara(); closeLists(); out.push('<h2>' + inlineMd(m[1]) + '</h2>'); }
    else if (m = line.match(/^# (.+)$/)) { flushPara(); closeLists(); out.push('<h1>' + inlineMd(m[1]) + '</h1>'); }
    else if (m = line.match(/^&gt; (.+)$/)) { flushPara(); closeLists(); out.push('<blockquote>' + inlineMd(m[1]) + '</blockquote>'); }
    else if (m = line.match(/^(\d+)\. (.+)$/)) {
      flushPara();
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push('<li>' + inlineMd(m[2]) + '</li>');
    } else if (m = line.match(/^[-*] (.+)$/)) {
      flushPara();
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push('<li>' + inlineMd(m[1]) + '</li>');
    } else if (line.match(/^---+$/)) {
      flushPara(); closeLists();
      out.push('<div class="divider">' + '─'.repeat(72) + '</div>');
    } else {
      paraBuf.push(inlineMd(line));
    }
  }
  flushPara(); closeLists();
  if (inCode) out.push('</code></pre>');
  return out.join('');
}

// =================== FS ===================
function resolvePath(input) {
  if (!input || input === '~') return '~';
  if (input === '.') return state.cwd;
  if (input === '..') {
    if (state.cwd === '~') return '~';
    const parts = state.cwd.split('/');
    parts.pop();
    return parts.length === 1 ? '~' : parts.join('/');
  }
  if (input.startsWith('~/')) return input;
  if (input.startsWith('/')) return '~' + input;
  if (state.cwd === '~') return '~/' + input;
  return state.cwd + '/' + input;
}
function collectTags() {
  const tags = new Set();
  Object.values(POSTS).forEach(p => p.tags.forEach(t => tags.add(t)));
  return Array.from(tags).sort();
}
function isDir(path) {
  if (path === '~' || path === '~/posts' || path === '~/projects' || path === '~/topics') return true;
  if (path.startsWith('~/topics/')) return collectTags().includes(path.split('/').pop());
  if (path.startsWith('~/projects/')) return !!PROJECTS[path.split('/')[2]];
  return false;
}
function listDir(path) {
  if (path === '~') return [
    { name: 'posts', type: 'dir' },
    { name: 'projects', type: 'dir' },
    { name: 'topics', type: 'dir' },
    { name: 'README.md', type: 'file', cls: 'md' },
    { name: '.about', type: 'file', cls: 'hidden' },
    { name: '.contact', type: 'file', cls: 'hidden' },
  ];
  if (path === '~/posts') return Object.keys(POSTS).map(n => ({ name: n, type: 'file', cls: 'md' }));
  if (path === '~/projects') return Object.keys(PROJECTS).map(n => ({ name: n, type: 'dir' }));
  if (path === '~/topics') return collectTags().map(t => ({ name: t, type: 'dir' }));
  if (path.startsWith('~/topics/')) {
    const tag = path.split('/').pop();
    return Object.keys(POSTS).filter(n => POSTS[n].tags.includes(tag)).map(n => ({ name: n, type: 'file', cls: 'md' }));
  }
  if (path.startsWith('~/projects/')) {
    const proj = path.split('/')[2];
    if (PROJECTS[proj]) return [
      { name: 'README.md', type: 'file', cls: 'md' },
      { name: 'LICENSE', type: 'file' },
      { name: 'Makefile', type: 'file' },
    ];
  }
  return null;
}
function resolveFile(input) {
  const path = resolvePath(input);
  const parts = path.split('/');
  const last = parts[parts.length - 1];

  if (path === '~/README.md' || (state.cwd === '~' && input === 'README.md')) return { content: README, name: 'README.md' };
  if (path === '~/.about' || (state.cwd === '~' && input === '.about')) return { content: ABOUT, name: '.about' };
  if (path === '~/.contact' || (state.cwd === '~' && input === '.contact')) return { content: CONTACT, name: '.contact' };

  if (state.cwd === '~/posts' && POSTS[input]) return POSTS[input];
  if (path.startsWith('~/posts/') && POSTS[last]) return POSTS[last];

  if (state.cwd === '~/projects' && PROJECTS[input]) return { content: PROJECTS[input].content, name: input + '/README.md', title: PROJECTS[input].name };
  if (path.startsWith('~/projects/')) {
    const proj = parts[2];
    const file = parts[3];
    if (PROJECTS[proj] && (!file || file === 'README.md')) return { content: PROJECTS[proj].content, name: proj + '/README.md', title: PROJECTS[proj].name };
  }
  return null;
}

// =================== COMPLETION ===================
function getCurrentWord() {
  const val = cmdInput.value;
  const words = val.split(' ');
  return { word: words[words.length - 1], isFirst: words.length === 1, cmd: words[0], words };
}
function getCandidates(word, isFirst, cmd) {
  let candidates = [];
  if (isFirst) candidates = Object.keys(COMMANDS);
  else if (cmd === 'cat' || cmd === 'ls') {
    const items = listDir(state.cwd);
    if (items) candidates = items.map(i => i.name);
    if (state.cwd === '~') candidates.push('README.md', '.about', '.contact');
    if (state.cwd === '~') candidates.push('posts/', 'projects/', 'topics/');
  } else if (cmd === 'cd') {
    const items = listDir(state.cwd);
    if (items) candidates = items.filter(i => i.type === 'dir').map(i => i.name);
    candidates.push('..', '~', 'posts', 'projects', 'topics');
  } else if (cmd === 'man' || cmd === 'help') {
    candidates = [...new Set(Object.keys(MAN_PAGES).concat(Object.keys(COMMANDS)))];
  } else if (cmd === 'theme') candidates = Object.keys(THEMES);
  else if (cmd === 'crt' || cmd === 'sound') candidates = ['on', 'off'];
  else if (cmd === 'mail') candidates = ['jonathanjameswagner@proton.me'];
  return candidates;
}
function updateGhost() {
  const { word, isFirst, cmd } = getCurrentWord();
  if (!word) { ghostText.textContent = ''; return; }
  const candidates = getCandidates(word, isFirst, cmd);
  const matches = candidates.filter(c => c.toLowerCase().startsWith(word.toLowerCase()));
  if (matches.length === 0) ghostText.textContent = '';
  else if (matches.length === 1) ghostText.textContent = matches[0].slice(word.length);
  else {
    let prefix = matches[0];
    for (const m of matches) while (!m.toLowerCase().startsWith(prefix.toLowerCase())) prefix = prefix.slice(0, -1);
    ghostText.textContent = prefix.length > word.length ? prefix.slice(word.length) : '';
  }
}
function acceptCompletion() {
  if (ghostText.textContent) {
    cmdInput.value += ghostText.textContent;
    typedText.textContent = cmdInput.value;
    ghostText.textContent = '';
    updateGhost();
    playClick();
    return;
  }
  // no ghost — show all matches below
  const { word, isFirst, cmd } = getCurrentWord();
  if (word) {
    const candidates = getCandidates(word, isFirst, cmd);
    const matches = candidates.filter(c => c.toLowerCase().startsWith(word.toLowerCase()));
    if (matches.length > 1) {
      print('<span class="dim">' + matches.map(escapeHtml).join('    ') + '</span>');
      return;
    }
  }
  playBell();
}

// =================== HISTORY ===================
function navigateHistory(dir) {
  if (state.history.length === 0) return;
  if (dir === -1) {
    if (state.historyIndex === -1) state.historyIndex = state.history.length - 1;
    else if (state.historyIndex > 0) state.historyIndex--;
    else return;
  } else {
    if (state.historyIndex === -1) return;
    if (state.historyIndex < state.history.length - 1) state.historyIndex++;
    else { state.historyIndex = -1; cmdInput.value = ''; typedText.textContent = ''; ghostText.textContent = ''; return; }
  }
  cmdInput.value = state.history[state.historyIndex];
  typedText.textContent = cmdInput.value;
  ghostText.textContent = '';
  updateGhost();
}
function saveHistory(cmd) {
  if (state.history[state.history.length - 1] !== cmd) state.history.push(cmd);
  if (state.history.length > 100) state.history.shift();
  state.historyIndex = -1;
  try { localStorage.setItem('retroHistory', JSON.stringify(state.history)); } catch (e) {}
}

// =================== PROMPT ===================
function updatePrompt() {
  if (composeState) {
    promptText.innerHTML = '<span class="compose">mail</span>(<span style="color:var(--cyan)">' + composeState.mode + '</span>)<span class="path">▸</span>';
    statusPath.textContent = '~ (composing)';
  } else {
    const p = state.cwd === '~' ? ':~' : ':' + state.cwd;
    promptText.innerHTML = '<span style="color:var(--green)">user@blog</span><span class="path">' + p + '</span>$';
    statusPath.textContent = state.cwd;
  }
}

// =================== MAN PAGE TYPING ===================
let typingCancelled = false;
async function typeOutText(text, targetEl, delay = 4) {
  typingCancelled = false;
  targetEl.innerHTML = '';
  let buf = '';
  for (let i = 0; i < text.length; i++) {
    if (typingCancelled) {
      targetEl.innerHTML = '<pre>' + escapeHtml(text).replace(/\n/g, '<br>') + '</pre>';
      scrollBottom();
      return;
    }
    buf += text[i];
    targetEl.innerHTML = '<pre>' + escapeHtml(buf).replace(/\n/g, '<br>') + '</pre>';
    if (i % 6 === 0) scrollBottom();
    if (text[i] !== ' ' && text[i] !== '\n' && i % 2 === 0) await sleep(delay);
    else if (text[i] === '\n') await sleep(delay * 2);
  }
  scrollBottom();
}
function printManPage(text) {
  const div = document.createElement('div');
  div.className = 'line man-page';
  output.appendChild(div);
  scrollBottom();
  typeOutText(text, div, 3);
}

COMMANDS.man = (args) => {
  if (!args[0]) { print('What manual page do you want?', 'error'); print('Try: man ls, man cat, man cd, man mail', 'dim'); return; }
  const cmd = args[0];
  if (MAN_PAGES[cmd]) printManPage(MAN_PAGES[cmd]);
  else if (COMMANDS[cmd]) printManPage(cmd.toUpperCase() + '(1)\n\nNAME\n    ' + cmd + ' - no detailed manual available\n\nDESCRIPTION\n    Command exists but no manual page has been written.\n    Type \'' + cmd + '\' to try it.');
  else print('man: No manual entry for ' + cmd, 'error');
};

COMMANDS.ls = (args) => {
  let target = state.cwd;
  if (args[0]) target = resolvePath(args[0]);
  const items = listDir(target);
  if (!items) { print('ls: cannot access \'' + (args[0] || '') + '\': No such file or directory', 'error'); return; }
  if (items.length === 0) { printBlank(); return; }
  const html = items.map(item => {
    const cls = 'file ' + (item.cls || (item.type === 'dir' ? 'dir' : ''));
    return '<span class="' + cls + '">' + escapeHtml(item.name) + '</span>';
  }).join('');
  printRaw('<div class="listing">' + html + '</div>');
};

COMMANDS.cat = (args) => {
  if (!args[0]) { print('cat: missing file operand', 'error'); print('Try \'cat README.md\'', 'dim'); return; }
  const file = resolveFile(args[0]);
  if (!file) { print('cat: ' + args[0] + ': No such file or directory', 'error'); return; }
  if (file.title) {
    const tags = file.tags ? file.tags.join(', ') : '';
    printRaw('<div class="file-header"><span class="dim">' + '─'.repeat(74) + '</span>\n  <span class="amber">' + escapeHtml(file.name || args[0]) + '</span>' + (file.date ? ' <span class="dim">· ' + file.date + ' · ' + file.readTime + ' min' + (tags ? ' · ' + tags : '') + '</span>' : '') + '\n<span class="dim">' + '─'.repeat(74) + '</span></div>');
  }
  printRaw('<div class="post">' + renderMarkdown(file.content) + '</div>');
};

COMMANDS.cd = (args) => {
  const target = args[0] || '~';
  const resolved = resolvePath(target);
  if (!isDir(resolved)) { print('cd: ' + target + ': Not a directory', 'error'); return; }
  state.cwd = resolved;
  updatePrompt();
};

COMMANDS.neofetch = () => {
  const uptime = formatUptime(Date.now() - state.bootTime);
  const tags = collectTags().length;
  const logo = '   ___\n  /   \\\n |  \\u25C6  |      <span class="green">user</span>@<span class="green">blog</span>\n |     |      <span class="dim">─────────────</span>\n |  \\u25AE  |      <span class="amber">OS</span>:      retro.sh 2.4.1\n  \\___/       <span class="amber">shell</span>:   /bin/rsh\n   |||        <span class="amber">uptime</span>:  ' + uptime + '\n              <span class="amber">posts</span>:   ' + Object.keys(POSTS).length + '\n              <span class="amber">projects</span>: ' + Object.keys(PROJECTS).length + '\n              <span class="amber">topics</span>:   ' + tags + '\n              <span class="amber">theme</span>:   ' + state.theme + '\n              <span class="amber">crt</span>:     ' + (state.crt ? 'on' : 'off') + '\n              <span class="amber">sound</span>:   ' + (state.sound ? 'on' : 'off');
  // need to render unicode chars properly
  const logoHtml = logo.replace(/\\u25C6/g, '\u25C6').replace(/\\u25AE/g, '\u25AE');
  printRaw('<pre class="neofetch">' + logoHtml + '</pre>');
};

COMMANDS.theme = (args) => {
  const name = args[0];
  if (!name) { print('available: ' + Object.keys(THEMES).join(', '), 'dim'); print('current: ' + state.theme, 'success'); return; }
  if (!THEMES[name]) { print('theme: \'' + name + '\' not found. available: ' + Object.keys(THEMES).join(', '), 'error'); return; }
  applyTheme(name);
  print('theme: ' + name, 'success');
};

COMMANDS.crt = (args) => {
  const v = args[0];
  if (v === 'on' || v === 'off') state.crt = v === 'on';
  else state.crt = !state.crt;
  document.getElementById('crtOverlay').style.opacity = state.crt ? '1' : '0';
  $('statusCrt').textContent = state.crt ? 'on' : 'off';
  print('crt: ' + (state.crt ? 'on' : 'off'), 'success');
};

COMMANDS.sound = (args) => {
  const v = args[0];
  if (v === 'on' || v === 'off') state.sound = v === 'on';
  else state.sound = !state.sound;
  $('statusSound').textContent = state.sound ? 'on' : 'off';
  if (state.sound) { ensureAudio(); playClick(); }
  print('sound: ' + (state.sound ? 'on' : 'off'), 'success');
};

COMMANDS.echo = (args) => print(escapeHtml(args.join(' ')));
COMMANDS.date = () => print(new Date().toString());

// Easter eggs
COMMANDS.sudo = () => {
  print('<span class="error">user is not in the sudoers file. This incident will be reported.</span>');
  print('<span class="dim">[incident #42 logged to /var/log/auth]</span>');
};
COMMANDS.rm = (args) => {
  const s = args.join(' ');
  if (s.includes('-rf') && (s.includes('/') || s.includes('~') || s.includes('*'))) {
    print('<span class="error">rm: permission denied: nice try.</span>');
    print('<span class="dim">[this incident has been reported to /dev/null]</span>');
  } else if (args.length === 0) { print('rm: missing operand', 'error'); print("Try 'rm --help'.", 'dim'); }
  else print('rm: cannot remove \'' + args[0] + '\': Permission denied', 'error');
};
COMMANDS.exit = () => print('<span class="dim">there is no escape. this is the only window.</span>');
COMMANDS.logout = COMMANDS.exit;
COMMANDS.vim = () => { print('<span class="dim">you are already in a terminal. opening vim would be redundant.</span>'); print('<span class="dim">:q!</span>'); };
COMMANDS.emacs = () => print('<span class="dim">emacs is a great operating system. it lacks only a decent editor.</span>');
COMMANDS.apt = COMMANDS.brew = COMMANDS.npm = COMMANDS.yarn = COMMANDS.pip = () => {
  print('<span class="dim">this is a static site. there is nothing to install.</span>');
  print('<span class="dim">but nice try.</span>');
};
COMMANDS.cowboy = () => print("<span class='amber'>🤠</span> <span class='dim'>howdy. (yes, that's an emoji. the terminal forgives me.)</span>");
COMMANDS.about = COMMANDS.whoami;

// =================== MAIL ===================
function startMailCompose(to) {
  composeState = { to, subject: '', lines: [], mode: 'subject' };
  printRaw('<div class="mail-form"><span class="dim">┌── compose ──────────────────────────────</span>\n<span class="dim">│</span> <span class="dim">to:</span> <span class="cyan">' + escapeHtml(to) + '</span>\n<span class="dim">│</span> <span class="dim">subject:</span> <span class="dim">(type below, then Enter)</span>\n<span class="dim">└─────────────────────────────────────────</span></div>');
  updatePrompt();
}
function handleComposeLine(val) {
  if (!composeState) return;
  if (composeState.mode === 'subject') {
    composeState.subject = val;
    print('<span class="dim">subject:</span> <span class="amber">' + escapeHtml(val) + '</span>');
    print('<span class="dim">type your message. end with a single "." on its own line, or Ctrl+D.</span>', 'dim');
    composeState.mode = 'body';
  } else {
    if (val === '.') finishMailCompose();
    else { composeState.lines.push(val); print('<span class="dim">›</span> ' + escapeHtml(val)); }
  }
}
function finishMailCompose() {
  if (!composeState) return;
  const cs = composeState;
  printBlank();
  const body = cs.lines.join('\n');
  printRaw('<div class="mail-summary"><span class="dim">─── message ready ───</span>\n\n  <span class="dim">To:</span> <span class="cyan">' + escapeHtml(cs.to) + '</span>\n  <span class="dim">Subject:</span> <span class="amber">' + escapeHtml(cs.subject || '(no subject)') + '</span>\n\n' + (body ? cs.lines.map(l => '  ' + escapeHtml(l)).join('\n') : '  <span class="dim">(empty body)</span>') + '\n\n<span class="success">[message sent. or it would be, if this were a real mail server.]</span>\n<span class="dim">[opening your mail client as backup...]</span></div>');
  composeState = null;
  updatePrompt();
  const mailto = 'mailto:' + cs.to + '?subject=' + encodeURIComponent(cs.subject) + '&body=' + encodeURIComponent(body);
  setTimeout(() => { try { window.open(mailto, '_blank'); } catch (e) {} }, 800);
}

// =================== SUBMIT ===================
function submitCommand(raw) {
  const val = raw.trim();
  const pathStr = state.cwd === '~' ? ':~' : ':' + state.cwd;
  print('<span style="color:var(--green)">user@blog</span><span class="path">' + pathStr + '</span>$ ' + escapeHtml(val), 'cmd-echo');
  if (!val) return;
  saveHistory(val);
  const parts = val.split(/\s+/);
  const cmd = parts[0];
  const args = parts.slice(1);
  if (COMMANDS[cmd]) {
    try { COMMANDS[cmd](args); }
    catch (e) { print('<span class="error">internal error: ' + escapeHtml(e.message) + '</span>'); console.error(e); }
  } else {
    print('<span class="error">' + cmd + ': command not found</span>');
    // suggest similar
    const known = Object.keys(COMMANDS);
    const close = known.filter(c => c.startsWith(cmd.slice(0, Math.max(1, cmd.length - 2)))).slice(0, 3);
    if (close.length) print('<span class="dim">did you mean: ' + close.map(s => '`' + s + '`').join(' / ') + '?</span>', 'dim');
    print("<span class='dim'>type 'help' for available commands.</span>", 'dim');
    playBell();
  }
}

// =================== INPUT ===================
cmdInput.addEventListener('keydown', (e) => {
  typingCancelled = true;

  if (composeState) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = cmdInput.value;
      handleComposeLine(val);
      cmdInput.value = '';
      typedText.textContent = '';
      ghostText.textContent = '';
      playClick();
    } else if (e.key === 'd' && e.ctrlKey) {
      e.preventDefault();
      if (composeState.mode === 'body') { finishMailCompose(); cmdInput.value = ''; typedText.textContent = ''; }
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      print('<span class="error">^C</span> <span class="dim">[compose cancelled]</span>');
      composeState = null;
      cmdInput.value = '';
      typedText.textContent = '';
      updatePrompt();
    }
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const val = cmdInput.value;
    submitCommand(val);
    cmdInput.value = '';
    typedText.textContent = '';
    ghostText.textContent = '';
    playClick();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    acceptCompletion();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    navigateHistory(-1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    navigateHistory(1);
  } else if (e.key === 'ArrowRight' && ghostText.textContent) {
    e.preventDefault();
    cmdInput.value += ghostText.textContent;
    typedText.textContent = cmdInput.value;
    ghostText.textContent = '';
    updateGhost();
    playClick();
  } else if (e.key === 'End') {
    if (ghostText.textContent) {
      e.preventDefault();
      cmdInput.value += ghostText.textContent;
      typedText.textContent = cmdInput.value;
      ghostText.textContent = '';
      updateGhost();
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    const val = cmdInput.value;
    const pathStr = state.cwd === '~' ? ':~' : ':' + state.cwd;
    print('<span style="color:var(--green)">user@blog</span><span class="path">' + pathStr + '</span>$ ' + escapeHtml(val) + '<span class="error">^C</span>', 'cmd-echo');
    cmdInput.value = '';
    typedText.textContent = '';
    ghostText.textContent = '';
  }
});

cmdInput.addEventListener('input', () => {
  typedText.textContent = cmdInput.value;
  updateGhost();
  playClick();
});

cmdInput.addEventListener('paste', () => {
  setTimeout(() => { typedText.textContent = cmdInput.value; updateGhost(); }, 0);
});

// Click anywhere in terminal focuses input
document.querySelector('.terminal').addEventListener('click', (e) => {
  if (window.getSelection().toString()) return;
  cmdInput.focus();
});

// =================== CLOCK ===================
function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + sec + 's';
  return sec + 's';
}
function updateClock() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  statusTime.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// =================== BOOT ===================
async function boot() {
  applyTheme(state.theme);
  updatePrompt();

  const bootLines = [
    { t: '[ <span class="ok">OK</span> ] retro shell v2.4.1 starting...', d: 70 },
    { t: '[ <span class="ok">OK</span> ] mounting <span class="cyan">/posts</span> <span class="dim">(' + Object.keys(POSTS).length + ' entries)</span>', d: 110 },
    { t: '[ <span class="ok">OK</span> ] mounting <span class="cyan">/projects</span> <span class="dim">(' + Object.keys(PROJECTS).length + ' entries)</span>', d: 95 },
    { t: '[ <span class="ok">OK</span> ] mounting <span class="cyan">/topics</span> <span class="dim">(' + collectTags().length + ' tags)</span>', d: 85 },
    { t: '[ <span class="ok">OK</span> ] loading phosphor drivers <span class="dim">[amber]</span>', d: 75 },
    { t: '[ <span class="ok">OK</span> ] initializing crt subsystem', d: 65 },
    { t: '[ <span class="warn">WARN</span> ] sound subsystem inactive <span class="dim">(type \'sound on\' to enable)</span>', d: 55 },
    { t: '[ <span class="ok">OK</span> ] reading history <span class="dim">(' + state.history.length + ' commands)</span>', d: 45 },
    { t: '', d: 100 },
  ];

  for (const line of bootLines) {
    print(line.t, 'boot-line');
    await sleep(line.d);
  }

  const motd = '<span class="dim">┌──────────────────────────────────────────────────────────────────────────┐</span>\n' +
               '<span class="dim">│</span>                                                                          <span class="dim">│</span>\n' +
               '<span class="dim">│</span>   <span class="amber" style="font-weight:600">retro.sh</span>  <span class="dim">—</span>  a developer blog that thinks it is a terminal.   <span class="dim">│</span>\n' +
               '<span class="dim">│</span>                                                                          <span class="dim">│</span>\n' +
               '<span class="dim">│</span>   type <span class="success">help</span> to see commands.    type <span class="success">ls</span> to look around.        <span class="dim">│</span>\n' +
               '<span class="dim">│</span>   type <span class="success">cat README.md</span> to begin.   type <span class="success">neofetch</span> for fun.       <span class="dim">│</span>\n' +
               '<span class="dim">│</span>                                                                          <span class="dim">│</span>\n' +
               '<span class="dim">└──────────────────────────────────────────────────────────────────────────┘</span>';
  printRaw(motd);
  printBlank();

  cmdInput.focus();
}

boot();
